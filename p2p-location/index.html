<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P Location</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f1e7;
      --panel: #fffdf9;
      --text: #1e1d1a;
      --muted: #6a655c;
      --accent: #0b6e4f;
      --border: #d8d1c3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(11, 110, 79, 0.10), transparent 32%),
        linear-gradient(180deg, #f9f6ef 0%, var(--bg) 100%);
      color: var(--text);
      font: 16px/1.5 Georgia, serif;
    }

    main {
      width: min(100%, 720px);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(35, 30, 20, 0.08);
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 2.8rem);
      line-height: 1.05;
    }

    p {
      margin: 14px 0 0;
      color: var(--muted);
    }

    ul {
      margin: 24px 0 0;
      padding-left: 20px;
    }

    li + li {
      margin-top: 10px;
    }

    a {
      color: var(--accent);
    }
  </style>
</head>
<body>
<main>
  <h1>P2P Location</h1>
  <p>This is a temporary landing page for the app website.</p>
  <p>More complete content can be added later. For now, these placeholder routes are available:</p>
  <ul>
    <li><a href="/p2p-location/privacy-policy">Privacy Policy</a></li>
    <li><a href="/p2p-location/app-usage-guide">App Usage Guide</a></li>
    <li><a href="/p2p-location/join/">Join Link Fallback</a></li>
  </ul>
</main>
</body>
</html>
